server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejor velocidad
    gzip on;
    gzip_types text/html text/css application/javascript image/jpeg image/png video/mp4;
    gzip_min_length 1000;

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|mp4|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Redirigir todo al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
